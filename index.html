<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>🌸 蔷薇誓约 · Lolita华丽衣橱</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Serif SC', serif;
        }
        body {
            background: #fdf3f7;
            background-image: radial-gradient(circle at 10% 20%, rgba(255,220,235,0.3) 0%, transparent 30%),
                              radial-gradient(circle at 90% 80%, rgba(210,170,200,0.2) 0%, transparent 40%);
            color: #3e2c33;
            min-height: 100vh;
        }
        .page-wrapper {
            max-width: 1440px;
            margin: 0 auto;
            padding: 20px 24px;
            position: relative;
        }
        .top-lace {
            text-align: center;
            padding: 6px 0;
            background: linear-gradient(90deg, #f9d8e4, #fce4ec, #f9d8e4);
            border-bottom: 2px solid #e6b0c2;
            border-top: 2px solid #e6b0c2;
            color: #7e4a5f;
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 18px;
            box-shadow: 0 4px 12px rgba(200,120,150,0.1);
        }
        .top-lace i {
            margin: 0 12px;
            color: #c65f7e;
        }
        .main-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 18px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            font-size: 44px;
            color: #d46b8a;
            filter: drop-shadow(0 4px 6px rgba(180,70,110,0.2));
        }
        .logo-text h1 {
            font-size: 34px;
            font-weight: 700;
            color: #9f4562;
            text-shadow: 3px 3px 0 #ffe2f0;
            letter-spacing: 4px;
        }
        .logo-text span {
            font-size: 14px;
            color: #b27a8c;
            font-style: italic;
        }
        .search-wrapper {
            flex: 1;
            max-width: 480px;
            min-width: 260px;
        }
        .search-bar {
            display: flex;
            border: 2px solid #e6aebb;
            border-radius: 60px;
            overflow: hidden;
            background: white;
            box-shadow: 0 8px 18px rgba(210,110,140,0.15);
        }
        .search-bar input {
            flex: 1;
            border: none;
            padding: 14px 22px;
            font-size: 15px;
            outline: none;
            background: transparent;
            color: #4a2e3a;
        }
        .search-bar input::placeholder {
            color: #d4a5b4;
            font-style: italic;
        }
        .search-bar button {
            background: #d46b8a;
            border: none;
            color: white;
            padding: 0 28px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            border-left: 1px solid #f1c1d0;
        }
        .search-bar button:hover {
            background: #b84f70;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 28px;
            font-size: 26px;
            color: #9f4562;
        }
        .cart-icon-wrapper {
            position: relative;
            cursor: pointer;
            background: rgba(255,240,245,0.7);
            padding: 10px 14px;
            border-radius: 50px;
            backdrop-filter: blur(2px);
            border: 1px solid #f3c7d6;
            box-shadow: 0 6px 12px rgba(160,80,110,0.1);
            transition: 0.2s;
        }
        .cart-icon-wrapper:hover {
            background: #ffe2ed;
            transform: scale(1.02);
        }
        .cart-count {
            position: absolute;
            top: -6px;
            right: -8px;
            background: #c65f7e;
            color: white;
            font-size: 14px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 40px;
            border: 2px solid white;
        }
        .nav-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 24px;
            padding: 16px 0 12px;
            border-bottom: 2px solid #f5cfdc;
            margin-bottom: 24px;
        }
        .cate-item {
            font-size: 17px;
            font-weight: 600;
            color: #78495e;
            padding: 6px 12px;
            border-radius: 40px;
            cursor: pointer;
            background: rgba(255,245,248,0.6);
            backdrop-filter: blur(2px);
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .cate-item i {
            margin-right: 6px;
            color: #c65f7e;
        }
        .cate-item:hover {
            background: #fce1ea;
            border-color: #e6aebb;
        }
        .cate-item.active {
            background: #d46b8a;
            color: white;
            border-color: #b84f70;
        }
        .cate-item.active i {
            color: white;
        }
        .content-layout {
            display: flex;
            gap: 28px;
            margin-top: 8px;
        }
        .products-section {
            flex: 2.8;
            min-width: 0;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
        }
        .section-header h3 {
            font-size: 24px;
            font-weight: 700;
            color: #5e3646;
            border-left: 12px solid #d46b8a;
            padding-left: 16px;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 26px 18px;
        }
        .product-card {
            background: #fff9fb;
            border-radius: 32px 8px 32px 8px;
            overflow: hidden;
            box-shadow: 0 16px 28px -8px rgba(150,70,100,0.15);
            border: 1px solid #fad4e3;
            transition: all 0.3s;
            cursor: pointer;
            backdrop-filter: blur(4px);
            position: relative;
        }
        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 24px 36px -8px rgba(190,90,130,0.25);
            border-color: #e6aebb;
        }
        .product-img {
            height: 260px;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
            padding: 12px;
        }
        .product-tag {
            background: #d46b8a;
            color: white;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border: 1px solid #ffcddc;
        }
        .product-info {
            padding: 18px 16px 18px;
        }
        .product-title {
            font-size: 17px;
            font-weight: 700;
            color: #4b2938;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .product-sku {
            font-size: 12px;
            color: #ac7b8c;
            background: #f5e2e9;
            padding: 2px 8px;
            border-radius: 30px;
        }
        .product-stock {
            font-size: 13px;
            color: #5e7a5e;
            margin-bottom: 8px;
        }
        .product-stock i {
            margin-right: 4px;
            color: #9f8b6b;
        }
        .price-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 12px 0 10px;
        }
        .current-price {
            font-size: 26px;
            font-weight: 700;
            color: #bc4e6b;
        }
        .current-price small {
            font-size: 16px;
            font-weight: 400;
        }
        .btn-add-cart {
            background: #f5e2e9;
            border: 1.5px solid #d46b8a;
            color: #9f4562;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-add-cart:hover {
            background: #d46b8a;
            color: white;
        }
        .cart-panel {
            flex: 1.2;
            min-width: 300px;
            background: rgba(255,250,252,0.85);
            backdrop-filter: blur(8px);
            border-radius: 48px 8px 48px 8px;
            padding: 24px 20px;
            box-shadow: 0 20px 40px rgba(150,80,110,0.15);
            border: 2px solid #fad4e3;
            height: fit-content;
            position: sticky;
            top: 20px;
        }
        .cart-header {
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 3px dotted #e6aebb;
            padding-bottom: 16px;
            margin-bottom: 16px;
        }
        .cart-header i {
            font-size: 32px;
            color: #d46b8a;
        }
        .cart-header h4 {
            font-size: 24px;
            color: #5e3646;
        }
        .cart-items {
            max-height: 360px;
            overflow-y: auto;
            padding-right: 6px;
        }
        .cart-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px dashed #f0c2d2;
        }
        .cart-item-img {
            width: 56px;
            height: 56px;
            border-radius: 20px 4px 20px 4px;
            background-size: cover;
            background-position: center;
            border: 2px solid #fad4e3;
        }
        .cart-item-info {
            flex: 1;
        }
        .cart-item-title {
            font-weight: 700;
            color: #4b2938;
        }
        .cart-item-price {
            color: #bc4e6b;
            font-weight: 600;
        }
        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cart-qty-btn {
            background: #f5e2e9;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 30px;
            color: #9f4562;
            font-weight: bold;
            cursor: pointer;
        }
        .cart-remove {
            color: #bc8a9a;
            cursor: pointer;
            margin-left: 4px;
        }
        .cart-summary {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 2px solid #f5cfdc;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 16px;
        }
        .total-price {
            font-size: 26px;
            font-weight: 700;
            color: #bc4e6b;
        }
        .btn-checkout {
            width: 100%;
            background: #d46b8a;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 60px;
            font-size: 20px;
            font-weight: bold;
            margin-top: 16px;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(180,70,110,0.3);
            transition: 0.2s;
            border: 1px solid #fcc7d6;
        }
        .btn-checkout:hover {
            background: #b84f70;
            transform: scale(0.98);
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(70,30,40,0.5);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fff9fb;
            max-width: 850px;
            width: 90%;
            border-radius: 48px 12px 48px 12px;
            padding: 28px 30px;
            box-shadow: 0 30px 50px rgba(120,50,70,0.3);
            border: 2px solid #fad4e3;
            position: relative;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-close {
            position: absolute;
            top: 18px; right: 24px;
            font-size: 32px;
            color: #bc8a9a;
            cursor: pointer;
        }
        .modal-body {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
        }
        .modal-gallery {
            flex: 1.2;
            min-width: 260px;
        }
        .modal-main-img {
            width: 100%;
            height: 280px;
            border-radius: 32px 8px 32px 8px;
            background-size: cover;
            background-position: center;
            border: 2px solid #fad4e3;
        }
        .modal-info {
            flex: 1.6;
        }
        .modal-title {
            font-size: 28px;
            color: #5e3646;
            font-weight: 700;
        }
        .modal-sku-stock {
            display: flex;
            gap: 20px;
            margin: 12px 0;
            color: #7a5262;
        }
        .size-selector {
            margin: 20px 0;
        }
        .size-options {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .size-btn {
            background: white;
            border: 2px solid #e6aebb;
            padding: 10px 22px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: #5e3646;
        }
        .size-btn.selected {
            background: #d46b8a;
            color: white;
            border-color: #b84f70;
        }
        .modal-price {
            font-size: 32px;
            color: #bc4e6b;
            margin: 16px 0;
        }
        .btn-add-modal {
            background: #d46b8a;
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .reviews-section {
            margin-top: 30px;
            border-top: 2px solid #f5cfdc;
            padding-top: 20px;
        }
        .review-item {
            display: flex;
            gap: 14px;
            padding: 16px 0;
            border-bottom: 1px solid #f5cfdc;
        }
        .review-avatar {
            width: 48px; height: 48px;
            background: #f2d1dd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9f4562;
        }
        .review-content p {
            margin-top: 6px;
            color: #4f3640;
        }
        .footer-note {
            margin-top: 40px;
            text-align: center;
            color: #ac7b8c;
        }
        @media (max-width: 900px) {
            .content-layout {
                flex-direction: column;
            }
            .cart-panel {
                position: static;
            }
        }
    </style>
</head>
<body>
<div class="page-wrapper">
    <div class="top-lace">
        <i class="fas fa-crown"></i> 蔷薇誓约 · 原创Lolita boutique <i class="fas fa-ribbon"></i> 满499包邮 · 新人礼遇 <i class="fas fa-crown"></i>
    </div>
    <div class="main-header">
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-feather-alt"></i></div>
            <div class="logo-text">
                <h1>蔷薇誓约</h1>
                <span>Lolita · 梦幻衣橱</span>
            </div>
        </div>
        <div class="search-wrapper">
            <div class="search-bar">
                <input type="text" placeholder="搜索柄图、JSK、SK、小物...">
                <button><i class="fas fa-search"></i></button>
            </div>
        </div>
        <div class="header-actions">
            <i class="far fa-heart"></i>
            <div class="cart-icon-wrapper" id="cartToggle">
                <i class="fas fa-shopping-bag"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </div>
    <div class="nav-categories">
        <span class="cate-item active"><i class="fas fa-home"></i> 首页</span>
        <span class="cate-item"><i class="fas fa-candy-cane"></i> 甜系Sweet</span>
        <span class="cate-item"><i class="fas fa-moon"></i> 哥特Gothic</span>
        <span class="cate-item"><i class="fas fa-crown"></i> 古典Classic</span>
        <span class="cate-item"><i class="fas fa-vest"></i> 基佬/王子</span>
        <span class="cate-item"><i class="fas fa-tags"></i> 折扣专区</span>
    </div>
   <div class="content-layout">
        <div class="products-section">
            <div class="section-header">
                <h3><i class="fas fa-star" style="margin-right: 8px; color:#d46b8a;"></i> 人气新品 · 原创设计</h3>
                <span style="color:#9f4562;">共9件商品</span>
            </div>
            <div class="product-grid" id="productGrid"></div>
        </div>
        <div class="cart-panel" id="cartPanel">
            <div class="cart-header">
                <i class="fas fa-shopping-bag"></i>
                <h4>我的蔷薇篮</h4>
            </div>
            <div class="cart-items" id="cartItemsContainer">
                <div style="text-align:center; padding:24px; color:#bc8a9a;">✨ 还没有宝贝，去逛逛吧</div>
            </div>
            <div class="cart-summary">
                <div class="summary-row"><span>商品件数</span><span id="cartItemCount">0</span></div>
                <div class="summary-row"><span>合计</span><span class="total-price" id="cartTotal">¥0</span></div>
                <button class="btn-checkout" id="checkoutBtn"><i class="fas fa-crown" style="margin-right: 8px;"></i>立即结算</button>
            </div>
        </div>
    </div>
    <div class="footer-note">
        <i class="fas fa-ribbon"></i> @2026 蔷薇誓约Lolita·华丽衣橱 | 品牌入驻 | 帮助中心 | 关于我们 <i class="fas fa-ribbon"></i>
    </div>
</div>
<div class="modal-overlay" id="productModal">
    <div class="modal-content">
        <span class="modal-close" id="closeModal">&times;</span>
        <div class="modal-body">
            <div class="modal-gallery">
                <div class="modal-main-img" id="modalImg"></div>
            </div>
            <div class="modal-info">
                <div class="modal-title" id="modalTitle"></div>
                <div class="modal-sku-stock">
                    <span><i class="fas fa-tag"></i> 商品编号: <span id="modalSku"></span></span>
                    <span><i class="fas fa-box"></i> 库存: <span id="modalStock"></span></span>
                </div>
                <div class="size-selector">
                    <label><i class="fas fa-ruler"></i> 选择尺码</label>
                    <div class="size-options" id="sizeOptions"></div>
                </div>
                <div class="modal-price" id="modalPrice"></div>
                <button class="btn-add-modal" id="modalAddCart"><i class="fas fa-shopping-bag"></i> 加入购物车</button>
                <div class="reviews-section">
                    <h5 style="margin-bottom: 8px;"><i class="fas fa-comment-dots"></i> 蔷薇物语 · 真实评价</h5>
                    <div id="reviewList"></div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    (function(){
        const products = [
            { id:1, name:'星夜花嫁JSK', style:'甜系', price:568, stock:15, sku:'LOL1001', img:'url(1.jpg)', tag:'新品', sizes:['S','M','L'], reviews:[{user:'草莓麻薯',text:'柄图太美！蕾丝柔软'}] },
            { id:2, name:'草莓奶冻OP', style:'甜系', price:288, stock:9, sku:'LOL1002', img:'url(2.jpg)', tag:'热卖', sizes:['S','M'], reviews:[{user:'奶油泡芙',text:'超可爱！'}] },
            { id:3, name:'云端梦境裙', style:'甜系', price:328, stock:4, sku:'LOL1003', img:'url(3.jpg")', tag:'仙气', sizes:['M','L'], reviews:[{user:'云朵',text:'仙气飘飘'}] },
            { id:4, name:'暗夜玫瑰OP', style:'哥特', price:398, stock:5, sku:'LOL2001', img:'url(4.jpg)', tag:'限量', sizes:['S','M'], reviews:[{user:'黑糖',text:'暗黑优雅'}] },
            { id:5, name:'荆棘古堡裙', style:'哥特', price:428, stock:3, sku:'LOL2002', img:'url(5.jpg)', tag:'华丽', sizes:['M','L'], reviews:[{user:'荆棘',text:'气场全开'}] },
            { id:6, name:'黑天鹅简约', style:'哥特', price:358, stock:7, sku:'LOL2003', img:'url(6.jpg)', tag:'日常', sizes:['S','M','L'], reviews:[{user:'天鹅',text:'显瘦百搭'}] },
            { id:7, name:'复古茶会JSK', style:'古典', price:458, stock:4, sku:'LOL3001', img:'url(7.jpg)', tag:'优雅', sizes:['M','L'], reviews:[{user:'茶会',text:'复古气质'}] },
            { id:8, name:'宫廷礼赞OP', style:'古典', price:498, stock:2, sku:'LOL3002', img:'url(8.jpg)', tag:'重工', sizes:['L','XL'], reviews:[{user:'宫廷',text:'华丽精致'}] },
            { id:9, name:'月光奏鸣曲', style:'古典', price:388, stock:8, sku:'LOL3003', img:'url(9.jpg)', tag:'温柔', sizes:['S','M','L'], reviews:[{user:'月光',text:'温柔绝美'}] }
        ];
        let cart = JSON.parse(localStorage.getItem('lolita_cart')) || [];
        let currentProduct = null;
        let selectedSize = '';
        const productGrid = document.getElementById('productGrid');
        const cartCountSpan = document.getElementById('cartCount');
        const cartItemsDiv = document.getElementById('cartItemsContainer');
        const cartItemCountSpan = document.getElementById('cartItemCount');
        const cartTotalSpan = document.getElementById('cartTotal');
        const modal = document.getElementById('productModal');
        function renderProducts(){
            productGrid.innerHTML = products.map(p=>`
                <div class="product-card" data-id="${p.id}">
                    <div class="product-img" style="background-image:${p.img};">
                        <span class="product-tag">${p.tag}</span>
                    </div>
                    <div class="product-info">
                        <div class="product-title">${p.name}<span class="product-sku">${p.sku}</span></div>
                        <div class="product-stock"><i class="fas fa-cubes"></i> 库存 ${p.stock} 件</div>
                        <div class="price-section">
                            <span class="current-price"><small>¥</small>${p.price}</span>
                            <span class="btn-add-cart" data-id="${p.id}"><i class="fas fa-plus"></i> 加入</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        function updateCartUI(){
            const totalItems = cart.reduce((s,i)=>s+i.quantity,0);
            cartCountSpan.textContent=totalItems;
            cartItemCountSpan.textContent=totalItems;
            const total=cart.reduce((s,i)=>s+i.price*i.quantity,0);
            cartTotalSpan.textContent=`¥${total}`;
            if(cart.length===0){cartItemsDiv.innerHTML=`<div style='text-align:center;padding:24px;color:#bc8a9a;'>✨ 还没有宝贝</div>`;return;}
            cartItemsDiv.innerHTML=cart.map(i=>`
                <div class="cart-item">
                    <div class="cart-item-img" style='background-image:${i.img};'></div>
                    <div class="cart-item-info">
                        <div class="cart-item-title">${i.name}(${i.size})</div>
                        <div class="cart-item-price">¥${i.price}</div>
                    </div>
                    <div class="cart-item-actions">
                        <button class="cart-qty-btn" data-action="decr" data-id="${i.id}" data-size="${i.size}">−</button>
                        <span>${i.quantity}</span>
                        <button class="cart-qty-btn" data-action="incr" data-id="${i.id}" data-size="${i.size}">+</button>
                        <i class="fas fa-trash-alt cart-remove" data-action="remove" data-id="${i.id}" data-size="${i.size}"></i>
                    </div>
                </div>
            `).join('');
            localStorage.setItem('lolita_cart',JSON.stringify(cart));
        }
        function handleCartAction(action,id,size){
            const p=products.find(x=>x.id==id);if(!p)return;
            const item=cart.find(x=>x.id==id&&x.size===size);
            if(action==='incr'){if(item&&item.quantity<p.stock)item.quantity++;else alert('库存不足');}
            else if(action==='decr'){if(item&&item.quantity>1)item.quantity--;else cart=cart.filter(x=>!(x.id==id&&x.size===size));}
            else if(action==='remove') cart=cart.filter(x=>!(x.id==id&&x.size===size));
            else if(action==='add'){
                if(!size){alert('请选尺码');return false;}
                if(item){if(item.quantity<p.stock)item.quantity++;else{alert('库存不足');return false;}}
                else cart.push({id:p.id,name:p.name,price:p.price,size:size,quantity:1,img:p.img});
            }
            updateCartUI();return true;
        }
        function openModal(id){
            const p=products.find(x=>x.id==id);if(!p)return;currentProduct=p;
            document.getElementById('modalImg').style.backgroundImage=p.img;
            document.getElementById('modalTitle').textContent=p.name;
            document.getElementById('modalSku').textContent=p.sku;
            document.getElementById('modalStock').textContent=p.stock;
            document.getElementById('modalPrice').innerHTML=`<small>¥</small>${p.price}`;
            document.getElementById('sizeOptions').innerHTML=p.sizes.map(s=>`<span class='size-btn' data-size='${s}'>${s}</span>`).join('');
            document.getElementById('reviewList').innerHTML=p.reviews.map(r=>`
                <div class='review-item'><div class='review-avatar'><i class='fas fa-user-circle'></i></div>
                <div class='review-content'><strong>${r.user}</strong><p>${r.text}</p></div></div>
            `).join('');
            modal.style.display='flex';selectedSize='';
        }
        document.addEventListener('click',e=>{
            const card=e.target.closest('.product-card');
            if(card&&!e.target.closest('.btn-add-cart'))openModal(card.dataset.id);
            if(e.target.closest('.btn-add-cart'))openModal(e.target.closest('.btn-add-cart').dataset.id);
            if(e.target.classList.contains('size-btn')){
                document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('selected'));
                e.target.classList.add('selected');selectedSize=e.target.dataset.size;
            }
    });
        document.getElementById('modalAddCart').onclick=()=>{
            if(!currentProduct||!selectedSize){alert('请选择尺码');return;}
            if(handleCartAction('add',currentProduct.id,selectedSize))modal.style.display='none';
    };
        document.getElementById('closeModal').onclick=()=>modal.style.display='none';
        cartItemsDiv.addEventListener('click',e=>{
            const btn=e.target.closest('[data-action]');
            if(!btn)return;handleCartAction(btn.dataset.action,btn.dataset.id,btn.dataset.size);
    });
        document.getElementById('checkoutBtn').onclick=()=>{
            if(cart.length===0)alert('购物车为空');
    else alert(`结算成功！总价：¥${cart.reduce((s,i)=>s+i.price*i.quantity,0)}`);
    };
        document.getElementById('cartToggle').onclick=()=>{
            document.getElementById('cartPanel').scrollIntoView({behavior:'smooth'});
    };
        renderProducts();updateCartUI();
        })();
</script>
</body>
</html>
